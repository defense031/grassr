# Standard r-lib check matrix: https://github.com/r-lib/actions/tree/v2-branch/examples
on:
  push:
    branches: [main, v070-percentile-flag]
  pull_request:
    branches: [main, calibration-contrib]
  workflow_dispatch:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          # windows devel pins lme4 below 2.0: the runner's lme4 2.0-1
          # binary is ABI-incompatible with Matrix 1.7-5 there and kills
          # the R process inside the full suite (not our code; CRAN's
          # check path never loads lme4). Drop the pin once upstream
          # binaries realign.
          - {os: windows-latest, r: 'devel', pin: 'lme4@1.1-38'}
          - {os: windows-latest, r: 'release'}
          - {os: macos-latest,   r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            ${{ matrix.config.pin }}
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran", "--no-manual")'
          upload-snapshots: true
